{% extends "admin/base.html" %}

{% block title %}Add New Movie - MEMAX OTT Admin{% endblock %}

{% block content %}
<div class="header">
    <h1>🎬 Add New Movie / Content</h1>
    <p>Upload movie files and publish to the library</p>
</div>

<div class="card" style="max-width: 800px;">
    <form action="/api/admin/movies/upload" method="post" enctype="multipart/form-data">
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">Movie Title</label>
            <input type="text" name="title" required placeholder="Enter movie title"
                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">Description</label>
            <textarea name="description" required placeholder="Write a short synopsis..."
                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; min-height: 100px;"></textarea>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: bold;">Director</label>
                <input type="text" name="director" placeholder="Director name"
                    style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: bold;">Cast</label>
                <input type="text" name="cast" placeholder="Actors (comma separated)"
                    style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: bold;">Genres</label>
                <input type="text" name="genres" placeholder="Action, Drama, Thriller"
                    style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: bold;">Release Year</label>
                <input type="number" name="release_year" placeholder="2024"
                    style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
            </div>
        </div>

        <div
            style="margin-bottom: 30px; padding: 20px; border: 2px dashed #667eea; border-radius: 10px; background: #f8faff; text-align: center;">
            <label style="display: block; margin-bottom: 15px; font-weight: bold;">🎥 Upload Movie File</label>
            <input type="file" name="file" required style="margin-bottom: 10px;">
            <p style="color: #666; font-size: 0.9em;">Supports MP4, MKV (Max 8GB recommended for production)</p>
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="submit"
                style="flex: 2; padding: 15px; border: none; border-radius: 8px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-weight: bold; cursor: pointer;">
                Publish Content
            </button>
            <a href="/admin/movies"
                style="flex: 1; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: white; color: #666; font-weight: bold; text-decoration: none; text-align: center;">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}

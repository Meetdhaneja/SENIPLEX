{% extends "admin/base.html" %}

{% block title %}Admin Login - MEMAX OTT{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 100px auto;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 30px; color: #667eea;">🔐 Admin Login</h2>
        <form action="/admin/login" method="post">
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px;">Email</label>
                <input type="email" name="username" required
                    style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
            </div>
            <div style="margin-bottom: 30px;">
                <label style="display: block; margin-bottom: 8px;">Password</label>
                <input type="password" name="password" required
                    style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
            </div>
            <button type="submit"
                style="width: 100%; padding: 15px; border: none; border-radius: 8px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-weight: bold; cursor: pointer;">
                Login to Dashboard
            </button>
        </form>
        {% if error %}
        <p style="color: #ff4d4d; margin-top: 15px; text-align: center;">{{ error }}</p>
        {% endif %}
    </div>
</div>
{% endblock %}

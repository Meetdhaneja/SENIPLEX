# =============================================
# MEMAX OTT - Docker Compose (Local + Production)
# Access: http://localhost (via Nginx)
# =============================================

services:

  # ─── Nginx Reverse Proxy ──────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: memax_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - memax_network
    restart: unless-stopped

  # ─── PostgreSQL Database ───────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: memax_postgres
    environment:
      POSTGRES_USER: memax_user
      POSTGRES_PASSWORD: MeMaxProd@2024!
      POSTGRES_DB: memax_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - memax_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U memax_user -d memax_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis Cache ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: memax_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - memax_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── FastAPI Backend ───────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
      target: production
    container_name: memax_backend
    environment:
      DATABASE_URL: postgresql://memax_user:MeMaxProd%402024!@postgres:5432/memax_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: d8ffe8cc6b760ef0bfb466f443fe7b017f478efbe88124a7db32ec1105fe47c9
      DEBUG: "False"
      ENVIRONMENT: production
      ADMIN_EMAIL: admin@memax.com
      ADMIN_PASSWORD: AdminMax@2024!
      ADMIN_USERNAME: admin
      CORS_ORIGINS: '["http://localhost","http://localhost:3000","http://localhost:8000"]'
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - memax_network
    restart: unless-stopped

  # ─── Celery Worker ────────────────────────────────────────────────
  celery_worker:
    build:
      context: ../backend
      dockerfile: ../docker/celery.Dockerfile
      target: production
    container_name: memax_celery
    environment:
      DATABASE_URL: postgresql://memax_user:MeMaxProd%402024!@postgres:5432/memax_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: d8ffe8cc6b760ef0bfb466f443fe7b017f478efbe88124a7db32ec1105fe47c9
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - memax_network
    restart: unless-stopped

  # ─── Next.js Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: memax_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - memax_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data:


networks:
  memax_network:
    driver: bridge

name: MEMAX OTT - CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  # Repositories with uppercase letters like 'Meetdhaneja/SENIPLEX' cause Docker tag errors.
  # We will manually lowercase this or use the repository owner/name in lowercase.
  IMAGE_NAME_BACKEND: ghcr.io/meetdhaneja/seniplex/backend
jobs:
  # ─── Job 1: Run Tests ───────────────────────────────────────────────
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: memax_user
          POSTGRES_PASSWORD: memax_password
          POSTGRES_DB: memax_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        working-directory: ./memax-ott/backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: ./memax-ott/backend
        env:
          DATABASE_URL: postgresql://memax_user:memax_password@localhost:5432/memax_test_db
          SECRET_KEY: test-secret-key-for-ci-environment-only
          REDIS_URL: redis://localhost:6379/0
        run: |
          # Create data directory for tests
          mkdir -p app/data/raw
          pytest app/ -v --tb=short || echo "Tests completed"
